<!-- contact from -->


<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="text-center mb-5">
          <h2 class="fw-bold">Contact From</h2>
          <p class="text-muted"></p>
        </div>
        
        <form id="contactForm">

          <div class="mb-3">
            <label for="name" class="form-label"> Name</label>
            <input type="text" class="form-control" id="name" placeholder="Faruk" required>
          </div>

      
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="name@example.com" required>
          </div>

           <div class="mb-3">
            <label for="number" class="form-label">Phone Number</label>
            <input type="number" class="form-control" id="number" placeholder="017" required>
          </div>
                 <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <input type="address" class="form-control" id="number" placeholder="tayba@gmile.come" required>
          </div>

          
          <div class="mb-3">
            <label for="message" class="form-label">Message</label>
            <textarea class="form-control" id="message" rows="4" placeholder="How can we help?" required></textarea>
          </div>

          
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Submit</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
